services:
  # NestJS API service
  closedloop-api:
    container_name: closedloop-api
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://closedloop:closedloop_dev@closedloop-db:5432/closedloop_db
    depends_on:
      closedloop-db:
        condition: service_healthy
    volumes:
      - ./src:/app/src # Hot reload in dev
    networks:
      - closedloop-network
    restart: unless-stopped

  # PostgreSQL database
  closedloop-db:
    container_name: closedloop-db
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=closedloop
      - POSTGRES_PASSWORD=closedloop_dev
      - POSTGRES_DB=closedloop_db
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - closedloop-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closedloop -d closedloop_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  closedloop-network:
    driver: bridge

volumes:
  pgdata:
